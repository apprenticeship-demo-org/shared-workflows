[flake8]
# Maximum line length — match Black's default + a little room
max-line-length = 120

# Ignore:
#   E203 — whitespace before ':' (Black-compatible slicing)
#   W503 — line break before binary operator (Black-compatible)
extend-ignore = E203,W503

# Exclude virtual environments, build output, and auto-generated files
exclude =
    .venv,
    venv,
    env,
    .git,
    __pycache__,
    build,
    dist,
    *.egg-info

# Show the violation source rule in output
format = %(path)s:%(row)d:%(col)d: %(code)s %(text)s

# Per-file ignores — add entries as needed
# per-file-ignores =
#     tests/*: S101   # allow assert in tests

[isort]
profile = black
line_length = 120

[tool:pytest]
# Directories to search for tests
testpaths = .
# File patterns to pick up as test modules
python_files = test_*.py *_test.py
# Minimum coverage threshold (informational — pipeline never hard-fails on this)
# addopts = --cov=. --cov-report=xml --cov-report=term-missing
