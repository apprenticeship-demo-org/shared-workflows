name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

# Permissions required by the shared-workflows pipeline chain.
# security-events: write is needed for Trivy SARIF upload to the Security tab.
# pull-requests: write is needed for Copilot reviewer assignment.
# contents: write is needed for the Copilot instructions commit.
permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:

  # ── Detect whether any non-doc files changed ──────────────────────────────
  # Always runs so branch protection status checks are always satisfied —
  # even when only docs changed and the pipeline is skipped.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for non-doc changes
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || true)
          echo "Changed files:"
          echo "$CHANGED"
          NON_DOC=$(echo "$CHANGED" | grep -vE '(^$|\.md$|\.txt$|\.rst$)' \
            | grep -vE '^(docs/|\.vscode/|\.github/ISSUE_TEMPLATE/|\.github/PULL_REQUEST_TEMPLATE\.md|\.trivyignore|\.gitignore)' \
            || true)
          if [[ -n "$NON_DOC" ]]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Skip notice (docs-only change) ────────────────────────────────────────
  skip:
    name: CI skipped (docs only)
    needs: changes
    if: needs.changes.outputs.run == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Only documentation files changed — full CI pipeline skipped."

  # ── Full pipeline ──────────────────────────────────────────────────────────
  pipeline:
    name: CI pipeline
    needs: changes
    if: needs.changes.outputs.run == 'true'
    uses: apprenticeship-demo-org/shared-workflows/.github/workflows/pipeline.yml@main
    secrets: inherit
    # Optional overrides — uncomment and edit only the lines you need:
    # with:
    #   node-version: "20"            # default: 20
    #   package_manager: "auto"       # auto | npm | yarn | pnpm | bun
    #   framework: "auto"             # auto | nextjs | angular | remix | nuxt | vue | react | vanilla
    #   sonar-project-key: ""         # default: auto-derived as {org}_{repo}

  # ── Aggregated status ─────────────────────────────────────────────────────
  # THIS is the only check to add to branch protection rules: "CI Status"
  # Always runs. Passes when pipeline succeeded or was skipped (docs-only).
  # Fails when the pipeline actually failed.
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [pipeline, skip]
    if: always()
    steps:
      - name: Evaluate result
        run: |
          PIPELINE="${{ needs.pipeline.result }}"
          SKIP="${{ needs.skip.result }}"
          if [[ "$PIPELINE" == "success" || "$PIPELINE" == "skipped" ]] && \
             [[ "$SKIP"     == "success" || "$SKIP"     == "skipped" ]]; then
            echo "CI Status: passed (pipeline=$PIPELINE, skip=$SKIP)"
            exit 0
          else
            echo "CI Status: failed (pipeline=$PIPELINE, skip=$SKIP)"
            exit 1
          fi
