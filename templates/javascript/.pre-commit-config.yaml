# Pre-commit hooks for JavaScript / Node.js projects
# Install: pip install pre-commit  →  pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com

repos:

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch=main, --branch=master]

  # ---------------------------------------------------------------------------
  # Secret detection
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ---------------------------------------------------------------------------
  # Add your project's linter and formatter hooks below.
  # These depend on which tools your project uses, so we leave them to you.
  #
  # Examples (uncomment and adapt as needed):
  #
  # Prettier (requires prettier in your project's devDependencies):
  #   - repo: local
  #     hooks:
  #       - id: prettier
  #         name: Prettier
  #         language: node
  #         entry: npx prettier --write
  #         types_or: [javascript, jsx, ts, tsx, json, css, markdown]
  #         additional_dependencies: [prettier]
  #
  # ESLint (requires eslint in your project's devDependencies):
  #   - repo: local
  #     hooks:
  #       - id: eslint
  #         name: ESLint
  #         language: system
  #         entry: npx eslint --fix
  #         types_or: [javascript, jsx, ts, tsx]
  #         pass_filenames: true
  # ---------------------------------------------------------------------------
