# Pre-commit hooks for DevOps / infrastructure projects
# Install: pip install pre-commit  →  pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com

repos:

  # ---------------------------------------------------------------------------
  # General hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--unsafe]
        exclude: ^(charts/templates/)   # Helm templates use {{ }} syntax
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: [--branch=main, --branch=master]

  # ---------------------------------------------------------------------------
  # YAML linting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file=.yamllint.yml]
        exclude: ^(\.github/|charts/templates/)

  # ---------------------------------------------------------------------------
  # Dockerfile linting (only runs when a Dockerfile is present)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
        args: [--failure-threshold=warning]

  # ---------------------------------------------------------------------------
  # Secret detection
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ---------------------------------------------------------------------------
  # Add tool-specific hooks below if your project uses them.
  # These require the tools installed locally — only add what you actually use.
