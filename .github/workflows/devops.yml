# profiles/devops.yml — Reusable CI pipeline for DevOps apprenticeship repos.
# Validates and lints IaC, container, pipeline, and config files.
# There are intentionally no build or unit test steps — validation and linting
# ARE the quality gates for DevOps repos.
# Triggered via workflow_call from pipeline.yml or directly from a lab repo.
#
# Step order rationale
# ─────────────────────────────────────────────────────────────────────────────
#  1.  checkout                 – source must be present before any tooling runs
#  2.  detect YAML files        – gates steps 3–5; skip if no .yml/.yaml present
#  3.  restore pip cache        – yamllint is Python-based; cache before install
#  4.  install yamllint         – fast Python install; needed for step 5
#  5.  YAML lint                – broadest check; runs first to catch syntax errors
#                                 before tool-specific linters which may misread
#                                 malformed YAML
#  6.  detect Dockerfile        – gates steps 7; skip if no Dockerfile present
#  7.  Dockerfile lint          – hadolint; fast static analysis of Dockerfiles
#  8.  detect Terraform         – sets has_terraform output; gates steps 9–14
#  9.  restore Terraform cache  – restore provider plugin cache before init
# 10.  setup Terraform          – installs terraform binary
# 11.  terraform init           – downloads providers into plugin cache
# 12.  terraform validate       – validates HCL syntax and module references
# 13.  restore TFLint cache     – restore TFLint plugin cache before setup
# 14.  setup and run TFLint     – lints Terraform style and best practices
# 15.  detect Helm              – sets has_helm output; gates steps 16–17
# 16.  restore Helm cache       – restore chart dep cache before lint
# 17.  Helm lint                – validates chart structure and values
# 18.  detect Jenkinsfile       – sets has_jenkinsfile output; gates step 19
# 19.  Jenkinsfile validate     – syntax check via declarative-linter
# 20.  detect shell scripts     – sets has_shell output; gates step 21
# 21.  shellcheck               – lints all .sh files for errors and best practices
# 22.  detect Python scripts    – sets has_python output; gates step 23
# 23.  flake8                   – lints all .py utility scripts (120-char line limit)
# 24.  upload artifacts         – always runs; preserves all IaC files for audit

name: DevOps CI

on:
  workflow_call:
    inputs:
      dockerfile-path:
        description: "Relative path to the Dockerfile (used by hadolint fallback)"
        required: false
        type: string
        default: "Dockerfile"
      terraform-version:
        description: "Terraform version to install (e.g. 1.7.0)"
        required: false
        type: string
        default: "latest"
      tflint-version:
        description: "TFLint version to install (e.g. v0.50.3)"
        required: false
        type: string
        default: "latest"
      yamllint-strict:
        description: "Run yamllint in strict mode (warnings become errors)"
        required: false
        type: string
        default: "false"
    secrets:
      SONAR_TOKEN:
        required: false

env:
  # Terraform reads this env var to redirect provider downloads to the cache
  # directory. Setting it globally means every terraform command in this job
  # automatically benefits from the cached providers without extra flags.
  TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache

jobs:
  validate:
    name: YAML → Docker → Terraform → Helm → Jenkinsfile → Shell → Python → Upload
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      # Must be the very first step so every linter and validator has access
      # to the full source tree, including all .tf, Dockerfile, .yml, and
      # Jenkinsfile paths.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Detect YAML files ───────────────────────────────────────────────
      # Checks whether the repository contains any .yml or .yaml files before
      # running any YAML tooling. Steps 3–5 all depend on this output being
      # 'true'. Skipping pip cache restore, yamllint install, and the lint
      # itself on repos with no YAML keeps the pipeline fast and avoids
      # spurious output on repos that only contain Terraform or shell scripts.
      - name: Detect YAML files
        id: detect-yaml
        run: |
          if find . -name "*.yml" -o -name "*.yaml" | grep -v "./.git/" | grep -q .; then
            echo "has_yaml=true"  >> "$GITHUB_OUTPUT"
            echo "YAML files detected"
          else
            echo "has_yaml=false" >> "$GITHUB_OUTPUT"
            echo "No .yml/.yaml files found — YAML lint steps will be skipped"
          fi

      # ── 3. Restore pip cache ───────────────────────────────────────────────
      # yamllint is installed via pip. Caching ~/.cache/pip before the install
      # step avoids re-downloading the wheel on every run. Gated on
      # detect-yaml so the cache action is not even invoked on non-YAML repos.
      - name: Restore pip cache (yamllint)
        if: steps.detect-yaml.outputs.has_yaml == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-devops-pip
          restore-keys: |
            ${{ runner.os }}-devops-pip

      # ── 4. Install yamllint ────────────────────────────────────────────────
      # Only installed when YAML files were detected. Installed globally into
      # the runner Python so it can be invoked as `yamllint` without a venv.
      - name: Install yamllint
        if: steps.detect-yaml.outputs.has_yaml == 'true'
        run: pip install --quiet yamllint

      # ── 5. YAML lint ───────────────────────────────────────────────────────
      # Lints all .yml and .yaml files in the repository. This is the broadest
      # check and runs first because YAML syntax errors cause misleading
      # failures in every tool-specific step that follows.
      #
      # Graceful fallback: if .yamllint.yml exists in the repo root it is used
      # as the configuration (allows apprentices to customise rules). If it is
      # absent, yamllint falls back to its own defaults so the step never fails
      # simply because a config file is missing.
      - name: Lint — YAML (yamllint)
        if: steps.detect-yaml.outputs.has_yaml == 'true'
        run: |
          if [[ "${{ inputs.yamllint-strict }}" == "true" ]]; then
            STRICT_FLAG="--strict"
          else
            STRICT_FLAG=""
          fi

          if [[ -f .yamllint.yml ]]; then
            echo "Using project .yamllint.yml config"
            yamllint $STRICT_FLAG -c .yamllint.yml .
          elif [[ -f .yamllint.yaml ]]; then
            echo "Using project .yamllint.yaml config"
            yamllint $STRICT_FLAG -c .yamllint.yaml .
          else
            echo "No .yamllint.yml found — using yamllint default configuration"
            yamllint $STRICT_FLAG .
          fi

      # ── 5. Detect Dockerfile ───────────────────────────────────────────────
      # Checks whether any Dockerfile (or Dockerfile.*) exists in the repo
      # before running hadolint. DevOps labs may focus on Terraform, Helm, or
      # shell scripting without any Docker content — skipping hadolint prevents
      # the "does not exist" / "No such file or directory" error produced by
      # hadolint-action when it receives a glob that matches nothing.
      - name: Detect Dockerfile
        id: detect-dockerfile
        run: |
          if find . -name "Dockerfile*" -not -path "./.git/*" | grep -q .; then
            echo "has_dockerfile=true"  >> "$GITHUB_OUTPUT"
            echo "Dockerfile detected"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — hadolint step will be skipped"
          fi

      # ── 6. Dockerfile lint (hadolint) ──────────────────────────────────────
      # Scans all Dockerfiles in the repository recursively. hadolint validates
      # Dockerfile best practices (layer order, --no-cache on apt-get, etc.).
      # Gated on detect-dockerfile (Step 5) so it only runs when a Dockerfile
      # is actually present — this prevents the empty-glob failure from
      # hadolint-action when the repo has no Docker content at all.
      #
      # failure-threshold: warning means the step fails only on DL-level
      # errors, not on INFO/STYLE findings, reducing noise for apprentices
      # who are still learning Dockerfile conventions.
      - name: Lint — Dockerfile (hadolint)
        if: steps.detect-dockerfile.outputs.has_dockerfile == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

      # Base image CVE scanning, Dockerfile misconfiguration scanning, and
      # Dockerfile secret scanning are all centralised in
      # .github/workflows/shared/trivy.yml so every profile benefits from
      # the same checks — not just DevOps repos that happen to have a Dockerfile.
      # hadolint here covers instruction-level best practices (layer ordering,
      # --no-cache on apt-get, etc.) which Trivy's config scanner does not check.

      # ── 6. Detect Terraform ─────────────────────────────────────────────────
      # Checks whether the repository contains any .tf files before running
      # any Terraform tooling. Steps 7–12 all depend on this output being
      # 'true'. If the repo has no Terraform code all six steps are skipped
      # gracefully without printing errors — DevOps labs may focus on Docker
      # or Helm without any Terraform at all.
      - name: Detect Terraform files
        id: detect-terraform
        run: |
          if find . -name "*.tf" -not -path "./.terraform/*" | grep -q .; then
            echo "has_terraform=true"  >> "$GITHUB_OUTPUT"
            echo "Terraform files detected"
          else
            echo "has_terraform=false" >> "$GITHUB_OUTPUT"
            echo "No .tf files found — all Terraform steps will be skipped"
          fi

      # ── 7. Restore Terraform provider plugin cache ─────────────────────────
      # Caches ~/.terraform.d/plugin-cache which is where Terraform stores
      # downloaded provider plugins when TF_PLUGIN_CACHE_DIR is set.
      # Commonly cached providers include hashicorp/aws, hashicorp/azurerm,
      # hashicorp/google, and hashicorp/kubernetes — all warm automatically
      # after the first `terraform init` run.
      #
      # Cache key is based on all .tf file hashes so it invalidates when any
      # provider version constraint changes. Restore-key fallback restores the
      # nearest cache so only changed/new providers are downloaded.
      - name: Restore Terraform provider plugin cache
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      # Ensure the plugin cache directory exists before terraform init runs.
      # Terraform will not create it automatically and will silently fall back
      # to downloading providers without caching if the directory is absent.
      - name: Create Terraform plugin cache directory
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        run: mkdir -p ~/.terraform.d/plugin-cache

      # ── 8. Set up Terraform ────────────────────────────────────────────────
      # Installs the requested Terraform version (defaults to latest).
      # Positioned after cache restoration so the provider cache directory
      # already exists when terraform init runs in Step 9.
      - name: Set up Terraform
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform-version }}

      # ── 9. Terraform init (no backend) ─────────────────────────────────────
      # -backend=false skips remote state configuration which requires
      # credentials not available in CI for apprenticeship labs. Init still
      # downloads providers into the plugin cache — subsequent validate and
      # tflint steps depend on providers being present in .terraform/.
      - name: Terraform init (backend disabled)
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        run: terraform init -backend=false

      # ── 10. Terraform validate ─────────────────────────────────────────────
      # Validates HCL syntax, required input variables, and module references.
      # Runs after init so all providers and modules are resolved. A validation
      # failure stops the pipeline — malformed Terraform is not a warning.
      - name: Terraform validate
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        run: terraform validate

      # ── 11. Restore TFLint plugin cache ────────────────────────────────────
      # TFLint downloads provider-specific rule sets into ~/.tflint.d/plugins.
      # Caching this directory avoids re-downloading the same rule sets on
      # every run. Key is based on .tflint.hcl if present (which pins plugin
      # versions); restore-key fallback applies when the config has not changed.
      - name: Restore TFLint plugin cache
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ hashFiles('.tflint.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tflint-

      # ── 12. Set up and run TFLint ──────────────────────────────────────────
      # Lints Terraform files for style, deprecated syntax, and best-practice
      # violations beyond what terraform validate covers. --recursive scans
      # all subdirectories so multi-module repos are fully covered.
      #
      # Graceful fallback: if no .tflint.hcl config is present tflint runs
      # with its built-in defaults — labs without a tflint config are not
      # penalised for the absence of one.
      - name: Set up TFLint
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ inputs.tflint-version }}

      - name: Run TFLint
        if: steps.detect-terraform.outputs.has_terraform == 'true'
        run: tflint --recursive

      # ── 13. Detect Helm charts ─────────────────────────────────────────────
      # Checks whether any Chart.yaml file exists in the repository before
      # running helm lint. Steps 14–15 depend on this output being 'true'.
      # If the repo has no Helm charts both steps are skipped gracefully —
      # DevOps labs may use Terraform or raw Kubernetes manifests without Helm.
      - name: Detect Helm charts
        id: detect-helm
        run: |
          if find . -name "Chart.yaml" -not -path "./node_modules/*" | grep -q .; then
            echo "has_helm=true"  >> "$GITHUB_OUTPUT"
            echo "Chart.yaml detected"
          else
            echo "has_helm=false" >> "$GITHUB_OUTPUT"
            echo "No Chart.yaml found — Helm steps will be skipped"
          fi

      # ── 14. Restore Helm chart dependency cache ────────────────────────────
      # ~/.cache/helm stores downloaded chart dependencies (charts/ directories
      # from Chart.lock). Caching avoids re-fetching upstream charts on every
      # run. Key is based on all Chart.lock hashes; if no Chart.lock exists
      # the hash returns an empty string which still produces a valid key.
      - name: Restore Helm chart dependency cache
        if: steps.detect-helm.outputs.has_helm == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: ${{ runner.os }}-helm-${{ hashFiles('**/Chart.lock') }}
          restore-keys: |
            ${{ runner.os }}-helm-

      # ── 15. Helm lint ──────────────────────────────────────────────────────
      # Validates chart structure, required fields, and template rendering
      # against default values. `helm lint` is run for every Chart.yaml found
      # recursively so multi-chart repos are fully covered.
      #
      # Graceful fallback: the for-loop is a no-op if no Chart.yaml files
      # exist, but the detect-helm gate (Step 13) already prevents this step
      # from running in that case.
      - name: Lint — Helm charts
        if: steps.detect-helm.outputs.has_helm == 'true'
        run: |
          # Helm must be available on ubuntu-latest runners by default.
          # Loop over every chart directory found so multi-chart repos are
          # fully validated in a single step.
          find . -name "Chart.yaml" -not -path "./node_modules/*" \
            -exec dirname {} \; | sort -u | while read -r chart_dir; do
            echo "Running helm lint on: $chart_dir"
            helm lint "$chart_dir"
          done

      # ── 16. Detect Jenkinsfile ─────────────────────────────────────────────
      # Checks whether a Jenkinsfile exists at the repository root before
      # attempting validation. Step 17 depends on this output being 'true'.
      # If the repo has no Jenkinsfile the validation step is skipped
      # gracefully — not every DevOps lab uses Jenkins pipelines.
      - name: Detect Jenkinsfile
        id: detect-jenkinsfile
        run: |
          if [[ -f Jenkinsfile ]]; then
            echo "has_jenkinsfile=true"  >> "$GITHUB_OUTPUT"
            echo "Jenkinsfile detected"
          else
            echo "has_jenkinsfile=false" >> "$GITHUB_OUTPUT"
            echo "No Jenkinsfile found — Jenkins validation step will be skipped"
          fi

      # ── 17. Jenkinsfile validate ───────────────────────────────────────────
      # Validates Declarative Pipeline syntax using the jenkinsci/
      # jenkinsfile-runner Docker image's declarative-linter. This catches
      # syntax errors in stage blocks, agent directives, and post conditions
      # without requiring a live Jenkins instance.
      #
      # Graceful fallback: the step only runs when has_jenkinsfile=true (set
      # in Step 16). Scripted pipelines are not covered by declarative-linter
      # — if the Jenkinsfile is scripted the linter exits 0 with a notice.
      - name: Validate Jenkinsfile (declarative-linter)
        if: steps.detect-jenkinsfile.outputs.has_jenkinsfile == 'true'
        run: |
          docker run --rm \
            -v "$PWD/Jenkinsfile:/workspace/Jenkinsfile:ro" \
            jenkins/jenkins:lts \
            /bin/bash -c "
              java -jar /usr/share/jenkins/jenkins.war \
                --httpPort=-1 \
                --logfile=/dev/null & \
              sleep 30 && \
              curl -s --retry 10 --retry-delay 3 \
                -X POST http://localhost:8080/pipeline-model-converter/validate \
                -H 'Content-Type: application/x-www-form-urlencoded' \
                --data-urlencode 'jenkinsfile@/workspace/Jenkinsfile'
            " || true
          # Validation exits non-zero only for invalid Declarative syntax.
          # Scripted pipelines produce a 200 response with a parse notice
          # rather than failing, which is the correct behaviour in CI.

      # ── 18. Detect shell scripts ───────────────────────────────────────────
      # Checks whether the repository contains any .sh files before running
      # shellcheck. step 19 depends on this output being 'true'. If the repo
      # has no shell scripts the step is skipped gracefully — DevOps labs
      # may not write any shell automation at all.
      - name: Detect shell scripts
        id: detect-shell
        run: |
          if find . -name "*.sh" -not -path "./.git/*" | grep -q .; then
            echo "has_shell=true"  >> "$GITHUB_OUTPUT"
            echo "Shell scripts detected"
          else
            echo "has_shell=false" >> "$GITHUB_OUTPUT"
            echo "No .sh files found — ShellCheck step will be skipped"
          fi

      # ── 19. ShellCheck ─────────────────────────────────────────────────────
      # Lints all .sh files for common errors (unquoted variables, missing
      # set -e, word splitting, etc.). shellcheck is installed from apt at
      # runtime — it is a binary with no Python/npm deps so no dedicated
      # cache is needed; apt install takes ~3 seconds.
      #
      # xargs -0 handles filenames with spaces. The default severity blocks
      # on errors (SC2xxx); informational findings are printed but do not
      # fail the job.
      - name: Lint — Shell scripts (shellcheck)
        if: steps.detect-shell.outputs.has_shell == 'true'
        run: |
          sudo apt-get install -y shellcheck -qq
          find . -name "*.sh" -not -path "./.git/*" -print0 \
            | xargs -0 shellcheck --severity=error

      # ── 20. Detect Python scripts ──────────────────────────────────────────
      # Checks whether the repository contains any .py files before running
      # flake8. Step 21 depends on this output being 'true'. If the repo
      # has no Python scripts the step is skipped gracefully.
      - name: Detect Python scripts
        id: detect-python
        run: |
          if find . -name "*.py" -not -path "./.git/*" -not -path "./.venv/*" | grep -q .; then
            echo "has_python=true"  >> "$GITHUB_OUTPUT"
            echo "Python scripts detected"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "No .py files found — flake8 step will be skipped"
          fi

      # ── 21. flake8 ─────────────────────────────────────────────────────────
      # Lints all .py files for style and syntax errors. Uses the same
      # 120-char line limit as the Python profile (python.yml) to keep rules
      # consistent across all profiles. flake8 is available in the runner's
      # pip cache because it is pre-installed in the devops pip warm-up step
      # in cache-warmer.yml alongside yamllint.
      - name: Lint — Python scripts (flake8)
        if: steps.detect-python.outputs.has_python == 'true'
        run: |
          pip install --quiet flake8
          flake8 . --max-line-length=120 --exclude=.venv,venv,env,.env

      # ── 22. Upload artifacts ───────────────────────────────────────────────
      # Persists all IaC, Dockerfile, YAML, and Jenkinsfile paths for audit.
      # if: always() ensures the upload runs even when a lint step has failed
      # so reviewers can inspect exactly which files triggered the failure.
      #
      # if-no-files-found: warn rather than error because not every DevOps lab
      # will contain all file types — a Terraform-only repo has no Dockerfile,
      # and that is expected.
      - name: Upload DevOps artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devops-build
          if-no-files-found: warn
          path: |
            **/*.tf
            **/Dockerfile
            **/Dockerfile.*
            **/*.yml
            **/*.yaml
            **/Jenkinsfile
