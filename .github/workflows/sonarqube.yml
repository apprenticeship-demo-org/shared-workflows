# shared/sonarqube.yml — Reusable SonarQube / SonarCloud code quality workflow.
#
# ── Why fetch-depth: 0 ────────────────────────────────────────────────────────
# By default actions/checkout performs a shallow clone (depth 1) which gives
# SonarQube only the latest commit. SonarQube needs the full git history to:
#   • calculate "new code" correctly on PR analysis (blame data)
#   • compute accurate "lines added since reference branch" metrics
#   • track issue age and first-introduction commit for each finding
# Without full history every finding appears as "new" and blame-based metrics
# are wrong. fetch-depth: 0 fetches all branches and all commits.
#
# ── Dynamic project key ───────────────────────────────────────────────────────
# sonar.projectKey is set to  <org>_<repo>  (e.g. my-org_java-lab-01).
# This means every lab repo self-registers in SonarQube on its first run
# without any manual project creation in the UI. The underscore separator is
# the SonarQube convention for org-scoped keys. The same key is used
# consistently across branches and PRs so history accumulates in one place.
# Override via the project-key input if the repo needs a custom key.
#
# ── vars.SONAR_HOST_URL vs secrets.SONAR_HOST_URL ─────────────────────────────
# SONAR_HOST_URL is provisioned by post-apply.sh as a GitHub org *variable*
# (gh variable set SONAR_HOST_URL …), not a secret. It must be referenced as
# vars.SONAR_HOST_URL. Using secrets.SONAR_HOST_URL silently resolves to an
# empty string at runtime and causes the scanner to fall back to
# https://sonarcloud.io instead of the self-hosted instance.
#
# ── Artifact pattern '*-build' ────────────────────────────────────────────────
# Each profile uploads artifacts under a profile-specific name:
#   java-build       → target/ + target/site/jacoco/jacoco.xml
#   python-build     → coverage.xml
#   js-build         → coverage/ + dist/ + build/ etc.
#   devops-build     → .tf, Dockerfile, .yml, Jenkinsfile
# The pattern '*-build' matches whichever of these was produced so this
# workflow does not need to know which profile ran. merge-multiple: true
# flattens all matched artifacts into the working directory so SonarQube's
# scanner finds coverage reports at the paths it expects.
#
# ── Quality gate polling ──────────────────────────────────────────────────────
# sonarqube-scan-action submits the analysis and returns immediately.
# sonarqube-quality-gate-action polls the SonarQube server until the
# background analysis task completes and the gate result is available,
# then fails the step if the gate is RED. timeout-minutes: 5 prevents
# the job hanging indefinitely if the server is slow or unreachable.

name: SonarQube Analysis

on:
  workflow_call:
    inputs:
      sonar-host-url:
        description: "SonarQube server URL. Leave empty to use SonarCloud."
        required: false
        type: string
        default: "https://sonarcloud.io"
      project-key:
        description: >
          SonarQube project key override. When empty (default) the key is
          derived automatically as  <github.repository_owner>_<repo.name>
          so every lab repo self-registers without manual SonarQube setup.
        required: false
        type: string
        default: ""
      profile:
        description: "CI profile that ran: java | python | javascript. Devops is excluded from SonarQube."
        required: false
        type: string
        default: ""
    secrets:
      SONAR_TOKEN:
        required: false
      # NOTE: SONAR_HOST_URL is NOT a secret — it is a GitHub org variable
      # provisioned via `gh variable set`. Reference it as vars.SONAR_HOST_URL.
      # This secret declaration is intentionally absent.

jobs:
  sonarqube:
    name: SonarQube analysis & quality gate
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout with full history ──────────────────────────────────────
      # fetch-depth: 0 fetches all commits and all branches. Required for
      # accurate new-code detection, blame data, and PR differential analysis.
      # See header comment for full rationale.
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Download build artifacts from the profile job ──────────────────
      # The pattern '*-build' matches java-build, python-build, js-build, and
      # devops-build so this step works regardless of which profile ran.
      # merge-multiple: true unpacks all matched artifacts into the current
      # working directory, preserving relative paths. SonarQube will then find:
      #   • jacoco.xml   at target/site/jacoco/jacoco.xml  (Java)
      #   • coverage.xml at ./coverage.xml                 (Python)
      #   • lcov.info    at coverage/lcov.info             (JavaScript/Vitest)
      # If no artifact was uploaded (e.g. the profile job failed before upload)
      # the step exits 0 so SonarQube still runs and reports what it can.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build"
          merge-multiple: true
        continue-on-error: true

      # ── 3. Resolve project key ─────────────────────────────────────────────
      # If the caller supplied an explicit project-key input use it verbatim.
      # Otherwise derive  <owner>_<repo>  from GitHub context. This is done in
      # a shell step so the value is available to the scanner via GITHUB_OUTPUT.
      - name: Resolve SonarQube project key
        id: sonar-key
        run: |
          if [[ -n "${{ inputs.project-key }}" ]]; then
            KEY="${{ inputs.project-key }}"
            echo "Using explicit project key: $KEY"
          else
            # GitHub provides repository as "owner/repo"; replace / with _
            # to produce the SonarQube convention "owner_repo".
            KEY="${{ github.repository_owner }}_${{ github.event.repository.name }}"
            echo "Derived project key: $KEY"
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          # Also export to env so the pre-register step and scanner-args step
          # can reference it directly without steps.<id>.outputs.* syntax.
          echo "PROJECT_KEY=$KEY" >> "$GITHUB_ENV"

      # ── 4. Pre-register project in SonarQube ──────────────────────────────
      # Calls the SonarQube projects/create API before the scanner runs.
      # This ensures the project exists under the correct key and name on the
      # very first push — without it the scanner would create the project but
      # with default settings that may not match the permission template.
      # || true makes this step idempotent: a 400 "already exists" response is
      # silently absorbed so subsequent pushes continue without error.
      # Requires SONAR_TOKEN (org secret) and SONAR_HOST_URL (org variable).
      - name: Pre-register project in SonarQube
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || inputs.sonar-host-url }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -sf -o /dev/null \
            -X POST "$SONAR_HOST_URL/api/projects/create" \
            -H "Authorization: Bearer $SONAR_TOKEN" \
            -d "project=$PROJECT_KEY&name=$PROJECT_KEY" || true
          echo "Pre-registration attempted for project: $PROJECT_KEY"

      # ── 5. Build language-specific scanner arguments ───────────────────────
      # Constructs extra -D properties based on the profile that ran upstream.
      # Each language needs different coverage report paths and binary dirs.
      # The scanner silently ignores -D paths that do not exist so it is safe
      # to include both Maven and Gradle output paths for Java — whichever
      # build tool the caller uses, the correct report will be picked up.
      # Profile 'devops' never reaches this workflow (blocked in pipeline.yml)
      # so only java / python / javascript cases are handled here.
      - name: Build scanner args
        id: scanner-args
        run: |
          EXTRA=""
          case "${{ inputs.profile }}" in
            java)
              EXTRA="-Dsonar.java.binaries=target/classes,build/classes/java/main"
              EXTRA="$EXTRA -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,build/reports/jacoco/test/jacocoTestReport.xml"
              ;;
            python)
              EXTRA="-Dsonar.python.coverage.reportPaths=coverage.xml"
              EXTRA="$EXTRA -Dsonar.python.version=3"
              ;;
            javascript)
              EXTRA="-Dsonar.javascript.lcov.reportPaths=coverage/lcov.info,coverage/lcov-report/lcov.info"
              EXTRA="$EXTRA -Dsonar.typescript.tsconfigPaths=tsconfig.json"
              ;;
            *)
              # Empty profile or unknown — generic scan with no coverage args
              echo "No profile-specific scanner args (profile='${{ inputs.profile }}')"
              ;;
          esac
          echo "extra=$EXTRA" >> "$GITHUB_OUTPUT"
          echo "Scanner extra args: $EXTRA"

      # ── 6. SonarQube scan ─────────────────────────────────────────────────
      # Submits source and analysis metadata to the SonarQube server.
      # The scan runs asynchronously on the server — this step returns as soon
      # as the task is queued. The quality gate step (below) polls for the
      # result. SONAR_HOST_URL is read from the secret if set, otherwise falls
      # back to the input so both configuration styles work.
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || inputs.sonar-host-url }}
        with:
          args: >
            -Dsonar.projectKey=${{ steps.sonar-key.outputs.key }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=.
            -Dsonar.scm.provider=git
            ${{ steps.scanner-args.outputs.extra }}

      # ── 7. Quality gate check ──────────────────────────────────────────────
      # Polls the SonarQube server until the background analysis task that was
      # submitted in step 4 finishes and the quality gate result is published.
      # Fails this step (and therefore the pipeline) if the gate is RED.
      # timeout-minutes: 5 prevents an indefinite hang if the server is slow.
      # if: always() ensures this step runs even if the scan step hit a
      # transient error, so the quality gate result is always reported when
      # available.
      - name: SonarQube quality gate check
        id: quality-gate
        if: always()
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || inputs.sonar-host-url }}

      # ── 8. Quality gate summary ────────────────────────────────────────────
      # Prints the gate status to the log so it is visible without navigating
      # to the SonarQube UI. A RED gate will have already failed step 5;
      # this step is informational only. if: always() runs it on success and
      # failure so the status is always visible in the job summary.
      - name: Quality gate summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  SonarQube Analysis Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Project key  : ${{ steps.sonar-key.outputs.key }}"
          echo "  Project name : ${{ github.event.repository.name }}"
          echo "  SonarQube    : ${{ vars.SONAR_HOST_URL || inputs.sonar-host-url }}"
          echo "  Quality gate : ${{ steps.quality-gate.outputs.quality-gate-status }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
