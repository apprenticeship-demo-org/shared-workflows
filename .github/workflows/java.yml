# profiles/java.yml — Reusable CI pipeline for Java apprenticeship repos.
# Triggered via workflow_call from pipeline.yml or directly from a lab repo.
#
# Build-tool detection order
# ─────────────────────────────────────────────────────────────────────────────
#   Gradle wrapper (gradlew)     → gradle
#   Maven POM (pom.xml)          → maven  (uses mvnw wrapper if present, else mvn)
#   Ant build file (build.xml)   → ant
#   Nothing recognized           → warning, skip build
#
# Step order rationale
# ─────────────────────────────────────────────────────────────────────────────
# 1. checkout      – source must be present before anything else runs
# 2. setup-java    – toolchain must exist before any build command runs
# 3. detect        – identify build tool; every subsequent conditional reads outputs
# 4. restore cache – tool-specific cache restored before install/build
# 5. build & test  – compile, run tests, generate coverage (tool-appropriate command)
# 6. coverage      – post JaCoCo summary if a report is found (Maven or Gradle path)
# 7. prune cache   – evict volatile SNAPSHOT jars (Maven only)
# 8. trivy scan    – CVE scan after artifacts exist; failure blocks upload
# 9. upload        – persist build output and coverage for downstream jobs

name: Java CI

on:
  workflow_call:
    inputs:
      java-version:
        description: "JDK version to use (e.g. 17, 21)"
        required: false
        type: string
        default: "21"
      trivy-severity:
        description: "Comma-separated Trivy severity levels that fail the build"
        required: false
        type: string
        default: "CRITICAL,HIGH"
    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  build:
    name: Detect → Build & Test → Scan → Upload
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java ─────────────────────────────────────────────────────
      - name: Set up JDK ${{ inputs.java-version }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin

      # ── 3. Detect build tool ───────────────────────────────────────────────
      # Checks for wrapper scripts and build files in order of specificity.
      # The detected value is used by every subsequent conditional step so
      # detection only happens once.
      - name: Detect build tool
        id: detect
        run: |
          if [[ -f gradlew ]]; then
            echo "tool=gradle" >> "$GITHUB_OUTPUT"
          elif [[ -f pom.xml ]]; then
            echo "tool=maven" >> "$GITHUB_OUTPUT"
          elif [[ -f build.xml ]]; then
            echo "tool=ant" >> "$GITHUB_OUTPUT"
          else
            echo "tool=unknown" >> "$GITHUB_OUTPUT"
            echo "::warning title=No Build Tool Detected::No recognized build file found (gradlew, pom.xml, build.xml). Add your project files and push again."
          fi

      # ── 3b. Detect Dockerfile ─────────────────────────────────────────────
      # Java repos may package their app in a container image. Only run
      # hadolint when a Dockerfile is actually present — avoids the empty-glob
      # "does not exist" error from hadolint-action on pure Java repos that
      # deploy via Maven/Gradle without any Docker content.
      - name: Detect Dockerfile
        id: detect-dockerfile
        run: |
          if find . -name "Dockerfile*" -not -path "./.git/*" | grep -q .; then
            echo "has_dockerfile=true"  >> "$GITHUB_OUTPUT"
            echo "Dockerfile detected"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found — hadolint step will be skipped"
          fi

      # ── 3c. Dockerfile lint (hadolint) ────────────────────────────────────
      # Validates Dockerfile best practices when a Dockerfile is present.
      # Runs before the build so Docker issues surface alongside source errors
      # rather than after the expensive compile + test cycle.
      # failure-threshold: warning surfaces DL-level errors without failing
      # on INFO/STYLE findings — keeps the signal-to-noise ratio high.
      - name: Lint — Dockerfile (hadolint)
        if: steps.detect-dockerfile.outputs.has_dockerfile == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: warning

      # ── 4a. Restore Maven repository cache ────────────────────────────────
      - name: Restore Maven cache
        if: steps.detect.outputs.tool == 'maven'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4b. Restore Gradle caches ──────────────────────────────────────────
      - name: Restore Gradle cache
        if: steps.detect.outputs.tool == 'gradle'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Build and test ──────────────────────────────────────────────────
      # Runs the full build + test lifecycle for the detected tool.
      # For Maven: mvn verify runs compile → test → package and triggers JaCoCo.
      # For Gradle: gradle build runs compile, test, and any configured checks.
      # For Ant:   ant is invoked with common target names; adjust if needed.
      - name: Build and test
        run: |
          case "${{ steps.detect.outputs.tool }}" in
            gradle)
              chmod +x gradlew 2>/dev/null || true
              ./gradlew build --no-daemon
              ;;
            maven)
              chmod +x mvnw 2>/dev/null || true
              MVNCMD=$(if [[ -f mvnw ]]; then echo ./mvnw; else echo mvn; fi)
              $MVNCMD --batch-mode --no-transfer-progress verify
              ;;
            ant)
              ant build test 2>/dev/null || ant build
              ;;
            unknown)
              echo "Skipping build — no build tool detected"
              ;;
          esac

      # ── 6. Post JaCoCo coverage summary ───────────────────────────────────
      # Searches known JaCoCo report locations for both Maven and Gradle.
      # Silently skips if no report is found (no tests yet, or JaCoCo not
      # configured). Does NOT fail the pipeline — SonarQube is the quality gate.
      # Also skips posting if zero lines were instrumented (no tests collected).
      - name: Post coverage summary
        if: always()
        run: |
          XML=""
          for candidate in \
            target/site/jacoco/jacoco.xml \
            build/reports/jacoco/test/jacocoTestReport.xml \
            build/reports/jacoco/jacocoTestReport.xml; do
            if [[ -f "$candidate" ]]; then XML="$candidate"; break; fi
          done

          if [[ -z "$XML" ]]; then
            exit 0  # No JaCoCo report — no tests or plugin not configured
          fi

          python3 - "$XML" <<'PYEOF'
          import xml.etree.ElementTree as ET, os, sys
          root = ET.parse(sys.argv[1]).getroot()
          counters = {c.attrib["type"]: c.attrib for c in root.findall("counter")}
          def pct(c):
              covered = int(c.get("covered", 0))
              total   = covered + int(c.get("missed", 0))
              return (covered / total * 100) if total else None
          line_pct   = pct(counters.get("LINE",   {}))
          branch_pct = pct(counters.get("BRANCH", {}))
          # Skip summary entirely if no lines were instrumented (no tests ran)
          if line_pct is None:
              sys.exit(0)
          icon = "🟢" if line_pct >= 80 else "🟡"
          flag = "✅ Pass" if line_pct >= 80 else "⚠️ Below threshold"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(f"## {icon} Java Test Coverage: {line_pct:.1f}%\n\n")
              f.write("| Metric | Coverage | Threshold | Status |\n")
              f.write("|--------|----------|-----------|--------|\n")
              f.write(f"| Line coverage   | {line_pct:.1f}%   | 80% | {flag} |\n")
              if branch_pct is not None:
                  f.write(f"| Branch coverage | {branch_pct:.1f}% | —   | —      |\n")
          if line_pct < 80:
              print(f"::warning title=Low Coverage::Java line coverage is {line_pct:.1f}%. Aim for ≥ 80%.")
          PYEOF

      # ── 7. Prune SNAPSHOT dependencies (Maven only) ───────────────────────
      # SNAPSHOT artifacts are re-published frequently and stale cached versions
      # cause hidden build failures. Evict them before the cache is saved.
      - name: Prune SNAPSHOT dependencies from Maven cache
        if: always() && steps.detect.outputs.tool == 'maven'
        run: find ~/.m2/repository -name "*SNAPSHOT*" -delete 2>/dev/null || true

      # ── 8. Trivy dependency CVE scan ─────────────────────────────────────
      # Uses the Java-specific CVE database for better Maven/Gradle coverage.
      # Fails the pipeline on CRITICAL or HIGH findings before artifacts upload.
      - name: Trivy — Java dependency CVE scan
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: ${{ inputs.trivy-severity }}
          exit-code: "1"
          vuln-type: library
          scanners: vuln
          skip-files: "**/*Test*.java,**/*Spec*.java"

      # ── 9. Upload build artifacts ──────────────────────────────────────────
      # Uploads both Maven (target/) and Gradle (build/) output so downstream
      # SonarQube analysis can consume whichever is present.
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-build
          if-no-files-found: warn
          path: |
            target/
            build/reports/
